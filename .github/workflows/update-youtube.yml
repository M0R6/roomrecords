name: Update YouTube feed JSON

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    paths:
      - 'scripts/fetch-youtube.js'
      - '.github/workflows/update-youtube.yml'
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC (adjust as needed)
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install

      - name: Run fetch script
        run: |
          mkdir -p static
          node ./scripts/fetch-youtube.js --channel-id UCUDpK4ExRCW8CqWsd6-UEXg --max 20 --output static/latest-videos.json

      - name: Commit generated JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/latest-videos.json
          git commit -m "chore: update latest YouTube videos (automated)" || echo "No changes to commit"
          git push
